<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Peaceful Dog Sign-up</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>
<body>
  <main>
    <section id="hero-sidebar">
      <div id="logo-box">
        <div id="logo-container">
          <img
            src="./assets/images/dog-icon.png"
            alt="the peaceful dog logo"
            height="512" width="512"
          >
          <div class="logo-text" id="logo-line1">THE</div>
          <div class="logo-text" id="logo-line2">PEACEFUL DOG</div>
        </div>
      </div>
      <p id="photo-info">
        Photo by <a href="https://unsplash.com/es/@mikitayo">Mikita Yo</a>
        on <a href="https://unsplash.com">Unsplash</a>
      </p>
      <img
        id="dog-photo"
        src="./assets/images/dog-unsplash.jpg"
        alt="dog with his owner"
        height="2160"
        width="1399"
      >
    </section>
    <section id="form-side">
      <div id="welcome-msg">
        <div>YOU KNOW THEY'RE A GOOD DOG. HELP THEM BE A GREAT ONE.</div>
        <div><strong>SIGN UP</strong> NOW TO JOIN THE PACK</div>
      </div>
      <form action="#" method="post">
        <div>
          <label for="first-name">FIRST NAME</label>
          <input type="text" id="first-name" name="first_name" required>
        </div>
        <div>
          <label for="last-name">LAST NAME</label>
          <input type="text" id="last-name" name="last_name" required>
        </div>
        <div>
          <label for="email">EMAIL</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div>
          <label for="phone-number">PHONE NUMBER</label>
          <input type="tel" id="phone-number" name="phone_number">
        </div>
        <div>
          <label for="password">PASSWORD</label>
          <input type="password" id="password" name="password">
        </div>
        <div>
          <label for="password-confirmation">CONFIRM PASSWORD</label>
          <input
            type="password"
            id="password-confirmation"
            name="password_confirmation"
          >
        </div>
        <div>
          <button type="submit">Create Account</button>
        </div>
      </form>
      <div>Already have an account?<a href="./index.html">Log in</a></div>
    </section>
  </main>
</body>
</html>
